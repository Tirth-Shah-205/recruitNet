<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RecruitNet - Forgot Password</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/forgotPassword.css">
</head>

<body>

<div class="card-box text-center">
  <h3 class="mb-4">Reset Password</h3>

  <form method="POST" action="forgot-password.php" onsubmit="return validateForm()">

    <!-- Username -->
    <input type="text" id="username" name="username"
           class="form-control mb-2"
           placeholder="Enter Username">
    <div id="userError" class="error mb-2"></div>

    <!-- New Password -->
    <input type="password" id="new_password" name="new_password"
           class="form-control mb-2"
           placeholder="New Password">
    <div id="passError" class="error mb-2"></div>

    <!-- Confirm Password -->
    <input type="password" id="confirm_password" name="confirm_password"
           class="form-control mb-2"
           placeholder="Confirm Password">
    <div id="confirmError" class="error mb-3"></div>

    <button type="submit" class="btn btn-main w-100">Update Password</button>
  </form>

  <div class="mt-4">
    <a href="login.html">← Back to Login</a>
  </div>
</div>
<script src="js/forgotPassword.js"></script>

</body>
</html>
