<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RecruitNet | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="auth-card">
    <h3>Login</h3>

    <!-- Role Switch -->
    <div class="role-switch">
        <button id="candidateBtn" class="active" onclick="setRole('candidate')">Candidate</button>
        <button id="companyBtn" onclick="setRole('company')">Company</button>
    </div>

    <!-- Login Form -->
    <form action="login.php" method="POST">
        <input type="hidden" name="type" id="userType" value="candidate">

        <input type="email" name="email" class="form-control mb-3" placeholder="Email Address" required>

        <input type="password" name="password" class="form-control mb-4" placeholder="Password" required>

        <button type="submit" class="btn-main w-100">Login</button>
    </form>

    <div class="auth-footer">
        Don’t have an account? <a href="register.html">Register</a>
    </div>
</div>
<script src="js/login.js"></script>
</body>
</html>
