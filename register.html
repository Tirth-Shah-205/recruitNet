<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RecruitNet | Signup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/register.css">
</head>
<body>

<div class="auth-card">
    <h3>Create Account</h3>

    <!-- Role Switch -->
    <div class="role-switch">
        <button id="candidateBtn" class="active" onclick="setRole('candidate')">
            <i class="fas fa-user me-2"></i>Candidate</button>
        <button id="companyBtn" onclick="setRole('company')">
            <i class="fas fa-building me-2"></i>Company</button>
    </div>

    <!-- Signup Form -->
    <form action="register.php" method="POST">
        <input type="hidden" name="type" id="userType" value="candidate">

        <input type="text" name="name" class="form-control mb-3" placeholder="Full Name / Company Name" required>

        <input type="email" name="email" class="form-control mb-3" placeholder="Email Address" required>

        <input type="text" name="phone" class="form-control mb-3" placeholder="Contact Number">

        <input type="password" name="password" class="form-control mb-4" placeholder="Password" required>

        <button type="submit" class="btn-main w-100">Register</button>
    </form>

    <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>
<script src="js/register.js"></script>

</body>
</html>
